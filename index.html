<!DOCTYPE html>
<html>
<head>
    <title>Galeri Foto Drive Saya</title>
    <style>
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; }
        .gallery img { width: 100%; height: auto; border-radius: 8px; }
    </style>
</head>
<body>
    <h1>Koleksi Foto</h1>
    <div id="gallery" class="gallery">
        </div>

    <script>
        const API_KEY = 'YOUR_API_KEY';
        const FOLDER_ID = '1M6s_QmybaYkbiUpebeXIY2Nv9IYzxH0P';

        // Fungsi untuk mengambil data file dari API Google Drive
        async function fetchPhotos() {
            const url = `https://www.googleapis.com/drive/v3/files?q='${FOLDER_ID}'+in+parents+and+mimeType+contains+'image/'&key=${API_KEY}&fields=files(id,name)`;
            
            const response = await fetch(url);
            const data = await response.json();
            
            const gallery = document.getElementById('gallery');
            data.files.forEach(file => {
                const img = document.createElement('img');
                // Link khusus untuk menampilkan thumbnail/gambar langsung
                img.src = `https://lh3.googleusercontent.com/u/0/d/${file.id}`;
                gallery.appendChild(img);
            });
        }
        fetchPhotos();
    </script>
</body>
</html>
